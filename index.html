<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Esstisch-Konfigurator – Zaza Woods</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Switzer:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F6F3;            /* bogade body background (1:1) */
    --bg-card: #FFFFFF;
    --header: #1A1A1A;
    --text: #1A1A1A;
    --text-muted: #6B6B6B;    /* bogade muted text */
    --accent: #C8965A;        /* bogade ochre accent (rgb 200,150,90) */
    --accent-strong: #B07F45; /* darker accent for hover */
    --accent-soft: #FDF8F2;   /* bogade selected-card peach */
    --border: #E8E6E1;        /* bogade borders & dividers */
    --shadow: 0 1px 3px rgba(0,0,0,0.06);  /* bogade soft shadow for round controls */
  }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  .app { display: flex; height: 100vh; height: 100dvh; width: 100vw; }

  /* Viewer */
  .viewer {
    flex: 1; position: relative;
    /* Flat, clean light background — seamless with the panel. */
    background: #F7F6F3;
    overflow: hidden;
  }
  #canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; }
  .watermark {
    position: absolute; top: 22px; left: 50%; transform: translateX(-50%);
    pointer-events: none; z-index: 4;
  }
  .watermark .mono {
    width: 40px; height: 40px; border-radius: 50%;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: Georgia, serif; font-size: 15px; letter-spacing: -1px;
    color: var(--text-muted);
  }
  .dim-pill {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: #fff; border: 1px solid var(--border);
    padding: 8px 18px; border-radius: 20px;
    font-size: 13px; color: var(--text); box-shadow: var(--shadow);
    z-index: 4;
  }
  .viewer-actions-bl, .viewer-actions-br {
    position: absolute; bottom: 16px; display: flex; gap: 10px; z-index: 4;
  }
  .viewer-actions-bl { left: 16px; }
  .viewer-actions-br { right: 16px; }
  .icon-round {
    width: 44px; height: 44px; border-radius: 50%;
    background: #fff; border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    transition: background .15s, color .15s, border-color .15s;
    color: var(--text);
  }
  .icon-round:hover { background: #F2EFE9; }
  .icon-round.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .icon-round svg { width: 19px; height: 19px; stroke: currentColor; fill: none; stroke-width: 1.7; }
  /* Dimension overlay labels (bogade style) */
  .dim-label {
    position: absolute; transform: translate(-50%, -50%);
    font-size: 11px; font-weight: 700; color: #222; white-space: nowrap;
    pointer-events: none; z-index: 5;
    text-shadow: 0 0 3px #F7F6F3, 0 0 3px #F7F6F3, 0 0 6px #F7F6F3;
  }
  /* AR QR modal (bogade style) */
  .ar-modal {
    position: fixed; inset: 0; background: rgba(20,18,14,0.38);
    display: none; align-items: center; justify-content: center; z-index: 50;
  }
  .ar-modal.show { display: flex; }
  .ar-card {
    background: #fff; border-radius: 16px; padding: 30px 30px 26px; position: relative;
    width: 330px; max-width: 88vw; text-align: center; box-shadow: 0 12px 48px rgba(0,0,0,0.22);
  }
  .ar-close { position: absolute; top: 14px; right: 17px; cursor: pointer; color: var(--text-muted); font-size: 15px; line-height: 1; }
  .ar-ic { width: 46px; height: 46px; margin: 0 auto 14px; color: var(--accent); }
  .ar-ic svg { width: 100%; height: 100%; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .ar-card h3 { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
  .ar-card p { font-size: 13px; color: var(--text-muted); margin-bottom: 18px; line-height: 1.45; }
  .ar-qr { display: flex; justify-content: center; margin-bottom: 16px; }
  .ar-qr img, .ar-qr canvas { border-radius: 8px; display: block; }
  .ar-card small { font-size: 11.5px; color: var(--text-muted); line-height: 1.45; display: block; }
  /* Share modal buttons */
  .snd-row { display: flex; gap: 10px; justify-content: center; }
  .snd-btn {
    flex: 1; padding: 12px 8px; border: 2px solid var(--border); background: #fff;
    border-radius: 10px; font-size: 13.5px; font-weight: 500; color: var(--text);
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px;
    transition: border-color .15s, background .15s;
  }
  .snd-btn:hover { border-color: var(--accent); background: var(--accent-soft); }
  .snd-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; }
  /* Saved configurations list */
  .save-cta {
    width: 100%; padding: 12px; border: none; background: var(--accent); color: #fff;
    font-size: 14px; font-weight: 600; border-radius: 10px; cursor: pointer; margin-bottom: 14px;
    transition: background .15s;
  }
  .save-cta:hover { background: var(--accent-strong); }
  .saved-list { display: flex; flex-direction: column; gap: 8px; max-height: 260px; overflow-y: auto; }
  .saved-empty { font-size: 12.5px; color: var(--text-muted); text-align: center; padding: 8px 0; }
  .saved-item {
    display: flex; align-items: center; gap: 12px; padding: 8px;
    border: 1px solid var(--border); border-radius: 10px; cursor: pointer; background: #fff;
    transition: border-color .15s;
  }
  .saved-item:hover { border-color: var(--accent); }
  .saved-item img { width: 52px; height: 40px; object-fit: cover; border-radius: 6px; background: var(--bg); flex: none; }
  .saved-item .si-txt { flex: 1; text-align: left; }
  .saved-item .si-name { font-size: 13.5px; font-weight: 600; }
  .saved-item .si-sub { font-size: 11.5px; color: var(--text-muted); margin-top: 1px; }
  .saved-item .si-del { color: var(--text-muted); font-size: 14px; padding: 4px 6px; flex: none; border-radius: 6px; }
  .saved-item .si-del:hover { color: #c0392b; }
  .toast {
    position: absolute; top: 70px; left: 50%; transform: translate(-50%, -20px);
    background: #111111; color: #fff; padding: 8px 16px; border-radius: 20px;
    font-size: 13px; opacity: 0; transition: all .25s ease; pointer-events: none; z-index: 10;
  }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }

  /* Loader */
  .loader {
    position: absolute; inset: 0;
    background: #F7F6F3;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; z-index: 9; transition: opacity .3s;
  }
  .loader.hidden { opacity: 0; pointer-events: none; }
  .loader-bar { width: 220px; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
  .loader-bar-inner { height: 100%; background: var(--accent); width: 0%; transition: width .15s; }
  .loader-text { font-size: 13px; color: var(--text-muted); letter-spacing: .3px;}

  /* Panel */
  .panel {
    width: 460px;
    background: #F7F6F3;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .panel-scroll { flex: 1; overflow-y: auto; padding: 20px 26px 10px; }
  .panel-scroll::-webkit-scrollbar { width: 6px; }
  .panel-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .panel-foot {
    padding: 14px 20px 18px;
    padding-bottom: calc(18px + env(safe-area-inset-bottom, 0px));
    border-top: 1px solid var(--border);
  }

  /* Accordion section — flat, divided by thin rules (bogade style) */
  .acc { background: transparent; border: none; border-radius: 0; margin: 0;
    overflow: hidden; border-bottom: 1px solid var(--border); }
  .acc:last-of-type { border-bottom: none; }
  .acc-head {
    display: flex; align-items: center; gap: 16px;
    padding: 20px 4px; cursor: pointer;
  }
  .acc-icon {
    width: 46px; height: 46px; border-radius: 50%;
    background: #fff; border: 1px solid var(--border); box-shadow: var(--shadow);
    display:flex; align-items:center; justify-content:center; flex: none;
  }
  .acc-icon svg { width: 24px; height: 24px; stroke: var(--text); fill: none; stroke-width: 1.4; }
  .acc-icon .step-num { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1; }
  .acc.locked > .acc-head { opacity: .42; pointer-events: none; cursor: default; }
  .acc.locked > .acc-body { display: none !important; }
  .viewer-empty {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px; text-align: center; padding: 24px; pointer-events: none; z-index: 2;
  }
  .viewer-empty b { font-size: 15px; font-weight: 600; color: var(--text); }
  .viewer-empty span { font-size: 13px; color: var(--text-muted); max-width: 320px; line-height: 1.45; }
  .panel-foot.hidden-foot { display: none; }
  .acc-icon.wood { background: linear-gradient(135deg, #D8A06A, #9C6A3C); border-color: transparent; }
  .acc-title { flex: 1; }
  .acc-title b { font-size: 16px; font-weight: 600; display: block; }
  .acc-title span { font-size: 13.5px; color: var(--text-muted); }
  .acc-arrow {
    width: 14px; height: 14px; transition: transform .2s;
    stroke: var(--text-muted); fill: none; stroke-width: 2;
  }
  .acc.open .acc-arrow { transform: rotate(180deg); }
  .acc-body { padding: 2px 2px 18px; display: none; }
  .acc.open .acc-body { display: block; }

  /* Option cards (4 per row) */
  .opt-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }
  .opt-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .opt-card {
    border: 2px solid var(--border); border-radius: 10px;
    padding: 13px 4px 10px; text-align: center; cursor: pointer;
    transition: border-color .15s, background .15s;
    background: #fff;
  }
  .opt-card:hover { border-color: var(--accent); }
  .opt-card.active { border-color: var(--accent); background: var(--accent-soft); }
  .opt-card .opt-ic {
    height: 30px; display:flex; align-items:center; justify-content:center; margin-bottom: 6px;
  }
  .opt-card .opt-ic svg { width: 30px; height: 24px; stroke: var(--text); fill: none; stroke-width: 1.4; }
  .opt-card .opt-name { font-size: 11.5px; color: var(--text-muted); }
  .opt-card.active .opt-name { color: var(--accent); font-weight: 500; }

  /* Length chips */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 9px 14px; border-radius: 8px;
    border: 2px solid var(--border); background: #fff;
    font-size: 13.5px; cursor: pointer;
    transition: all .15s;
    min-width: 64px; text-align: center;
  }
  .chip:hover { border-color: var(--accent); }
  .chip.active { border-color: var(--accent); background: var(--accent-soft); color: var(--text); font-weight: 500; }

  /* Component toggles */
  .tog-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .tog-row:last-child { border-bottom: none; }
  .tog-label { font-size: 13px; color: var(--text); }
  .tog {
    width: 38px; height: 22px; background: var(--border); border-radius: 11px;
    position: relative; cursor: pointer; transition: background .15s;
  }
  .tog::after {
    content: ''; position: absolute; width: 18px; height: 18px;
    background: #fff; border-radius: 50%; top: 2px; left: 2px;
    box-shadow: 0 1px 2px rgba(0,0,0,.15); transition: left .15s;
  }
  .tog.on { background: var(--accent); }
  .tog.on::after { left: 18px; }

  /* Swatches */
  .swatches { display: flex; gap: 10px; align-items: center; }
  .swatch {
    width: 38px; height: 38px; border-radius: 50%;
    cursor: pointer; border: 2px solid transparent;
    transition: transform .12s, border-color .12s;
    box-shadow: 0 1px 3px rgba(0,0,0,.12);
  }
  .swatch:hover { transform: scale(1.05); }
  .swatch.active { border-color: var(--accent); }
  .swatch-label { font-size: 12px; color: var(--text-muted); margin-left: 4px; }

  /* Summary — flat on the panel background (bogade style) */
  .overzicht {
    padding: 2px 2px 12px; background: transparent; border: none; box-shadow: none;
    margin-bottom: 4px;
  }
  .overzicht-h { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.9px; text-transform: uppercase; margin-bottom: 6px; }
  .overzicht-l1 { font-size: 14px; font-weight: 600; }
  .overzicht-l2 { font-size: 12.5px; color: var(--text-muted); margin-top: 2px; }
  .total-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 4px 10px; gap: 10px;
  }
  .total-row .lbl { font-size: 13px; line-height: 1.3; }
  .total-row .lbl-sub { display: block; font-size: 10.5px; font-weight: 500; color: var(--accent); margin-top: 1px; }
  .total-row .val { font-size: 20px; font-weight: 600; white-space: nowrap; }
  .cta {
    width: 100%; padding: 13px; border: none;
    background: var(--accent); color: #fff;
    font-size: 15px; font-weight: 600; letter-spacing: .3px;
    border-radius: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background .15s, transform .08s;
  }
  .cta:hover { background: var(--accent-strong); }
  .cta:active { transform: scale(.99); }
  .cta svg { width: 17px; height: 17px; stroke: #fff; fill: none; stroke-width: 1.8; }

  .hidden { display: none !important; }

  /* ===== Responsive ===== */

  /* Wide monitors — slightly roomier control panel */
  @media (min-width: 1700px) {
    .panel { width: 560px; }
  }
  @media (min-width: 2200px) {
    .panel { width: 640px; }
  }

  /* Tablets & phones — stack the 3D view on top, controls below */
  @media (max-width: 860px) {
    .app { flex-direction: column; height: 100vh; height: 100dvh; }
    .viewer { height: 50vh; height: 50dvh; min-height: 280px; flex: none; }
    .panel {
      width: 100%; border-left: none; border-top: none;
      flex: 1 1 auto; min-height: 0;
    }
  }

  /* Phones */
  @media (max-width: 560px) {
    .viewer { height: 44vh; height: 44dvh; min-height: 240px; }
    .panel-scroll { padding: 12px 14px 6px; }
    .panel-foot { padding: 12px 14px calc(14px + env(safe-area-inset-bottom, 0px)); }
    .acc { margin-bottom: 8px; }
    .acc-head { padding: 11px 12px; gap: 10px; }
    .acc-icon { width: 38px; height: 38px; }
    .opt-grid { gap: 6px; }
    .icon-round { width: 34px; height: 34px; }
    .icon-round svg { width: 15px; height: 15px; }
    .dim-pill { font-size: 11.5px; padding: 6px 12px; }
    .viewer-actions-bl, .viewer-actions-br, .dim-pill { bottom: 12px; }
    .viewer-actions-bl { left: 12px; }
    .viewer-actions-br { right: 12px; }
    .total-row .val { font-size: 18px; }
    .overzicht { padding: 12px 14px; }
  }

  /* Small phones — 2-column model grid so labels stay readable */
  @media (max-width: 480px) {
    .opt-grid { grid-template-columns: 1fr 1fr; }
  }

  /* Short landscape (phones rotated) — give the 3D view more height */
  @media (max-width: 860px) and (max-height: 500px) {
    .viewer { height: 62vh; height: 62dvh; min-height: 200px; }
  }

  /* Finish chips show the actual wood texture as a circular swatch */
  .chip-finish { padding: 4px 14px 4px 4px; gap: 10px; display: inline-flex; align-items: center; }
  .chip-finish .swatch {
    width: 26px; height: 26px; border-radius: 50%;
    background-size: cover; background-position: center;
    border: 1px solid rgba(0,0,0,0.15);
    flex: none; box-shadow: 0 0 0 2px #FFF inset;
  }
  .chip-finish.on .swatch { box-shadow: 0 0 0 2px var(--brand,#577476); }
  /* Make the finish grid display larger items so swatches are visible */
  #finish-chips { gap: 8px; }
</style>
</head>
<body>

<div class="app">
  <div class="viewer">
    <canvas id="canvas"></canvas>
    <div class="viewer-empty" id="viewer-empty" style="display:none">
      <b>Esstisch-Konfigurator</b>
      <span>Wähle Form, Gestell, Länge und Holzfinish.</span>
    </div>
    <div class="viewer-actions-bl">
      <div class="icon-round" id="btn-save" title="Konfiguration speichern">
        <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      </div>
      <div class="icon-round" id="btn-snd" title="Link teilen">
        <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.6 13.5 6.8 4M15.4 6.5l-6.8 4"/></svg>
      </div>
    </div>
    <div class="viewer-actions-br">
      <div class="icon-round" id="btn-dims" title="Abmessungen anzeigen">
        <svg viewBox="0 0 24 24"><path d="M21 3H3v18"/><path d="M21 3v18"/><path d="M3 21h18"/><path d="M7 3v3M11 3v3M15 3v3M19 3v3"/><path d="M3 7h3M3 11h3M3 15h3M3 19h3"/></svg>
      </div>
      <div class="icon-round" id="btn-ar" title="In AR ansehen">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
    </div>
    <div class="toast" id="toast"></div>
    <div class="loader hidden" id="loader">
      <div class="loader-bar"><div class="loader-bar-inner" id="bar"></div></div>
      <div class="loader-text" id="loader-text">3D-Modell wird geladen…</div>
    </div>
  </div>

  <aside class="panel">
    <div class="panel-scroll">
      <div class="acc open" id="acc-shape">
        <div class="acc-head"><div class="acc-icon"><span class="step-num">1</span></div><div class="acc-title"><b>Form</b><span id="sub-shape">–</span></div><svg class="acc-arrow" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>
        <div class="acc-body"><div class="chips" id="shape-chips"></div></div>
      </div>
      <div class="acc open" id="acc-leg">
        <div class="acc-head"><div class="acc-icon"><span class="step-num">2</span></div><div class="acc-title"><b>Gestell</b><span id="sub-leg">–</span></div><svg class="acc-arrow" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>
        <div class="acc-body"><div class="chips" id="leg-chips"></div></div>
      </div>
      <div class="acc open" id="acc-length">
        <div class="acc-head"><div class="acc-icon"><span class="step-num">3</span></div><div class="acc-title"><b>Länge</b><span id="sub-length">–</span></div><svg class="acc-arrow" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>
        <div class="acc-body"><div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;letter-spacing:.5px;">CM</div><div class="chips" id="length-chips"></div></div>
      </div>
      <div class="acc open" id="acc-finish">
        <div class="acc-head"><div class="acc-icon"><span class="step-num">4</span></div><div class="acc-title"><b>Holzfinish</b><span id="sub-finish">–</span></div><svg class="acc-arrow" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>
        <div class="acc-body"><div class="chips" id="finish-chips"></div></div>
      </div>
    </div>
    <div class="panel-foot">
      <div class="overzicht">
        <div class="overzicht-h">ÜBERSICHT</div>
        <div class="overzicht-l1" id="ov-l1">–</div>
        <div class="overzicht-l2" id="ov-l2">–</div>
      </div>
      <div class="total-row">
        <span class="lbl">Gesamtbetrag: <span class="lbl-sub">(inkl. kostenlose Lieferung)</span></span>
        <span class="val" id="price">€ –</span>
      </div>
      <button class="cta" id="cta">
        <span>In den Warenkorb legen</span>
      </button>
    </div>
  </aside>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;

const scene = new THREE.Scene();
scene.background = new THREE.Color('#F7F6F3');
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

const ground = new THREE.Mesh(
  new THREE.CircleGeometry(8, 64),
  new THREE.MeshStandardMaterial({ color: '#EEEBE5', roughness: 1, metalness: 0 })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);
scene.add(new THREE.AmbientLight(0xffffff, 0.45));
const dir = new THREE.DirectionalLight(0xffffff, 0.9);
dir.position.set(4, 8, 3);
scene.add(dir);

const camera = new THREE.PerspectiveCamera(35, 1, 0.1, 100);
if      (window.innerWidth < 860)  camera.position.set(3.5, 2.1, 4.0);
else if (window.innerWidth < 1700) camera.position.set(3.8, 2.3, 4.3);
else if (window.innerWidth < 2200) camera.position.set(3.4, 2.1, 3.8);
else                                camera.position.set(3.0, 1.9, 3.5);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.10;
controls.target.set(0, 0.5, 0);
controls.minDistance = 1.5;
controls.maxDistance = 18;
controls.rotateSpeed = 0.9;
controls.panSpeed = 0.7;
controls.enableZoom = false;
controls.maxPolarAngle = Math.PI / 2 - 0.04;

let zoomTargetRadius = camera.position.distanceTo(controls.target);
const ZOOM_SENSITIVITY = 0.0012, ZOOM_LERP = 0.18;
const clampR = r => Math.max(controls.minDistance, Math.min(controls.maxDistance, r));
document.querySelector('.viewer').addEventListener('wheel', e => {
  e.preventDefault(); e.stopPropagation();
  if (!e.deltaY) return;
  zoomTargetRadius = clampR(zoomTargetRadius * Math.exp(e.deltaY * ZOOM_SENSITIVITY));
}, { passive: false });

let pinchState = null;
const viewerEl = document.querySelector('.viewer');
viewerEl.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchState = { dist: Math.hypot(dx, dy), radius: camera.position.distanceTo(controls.target) };
  } else pinchState = null;
}, { passive: true, capture: true });
viewerEl.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && pinchState) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const d = Math.hypot(dx, dy);
    if (d > 0) zoomTargetRadius = clampR(pinchState.radius * (pinchState.dist / d));
    e.preventDefault(); e.stopPropagation();
  }
}, { passive: false, capture: true });
const endPinch = e => { if (e.touches.length < 2) pinchState = null; };
viewerEl.addEventListener('touchend', endPinch, { passive: true, capture: true });
viewerEl.addEventListener('touchcancel', endPinch, { passive: true, capture: true });

function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h; camera.updateProjectionMatrix();
}
new ResizeObserver(resize).observe(canvas);
resize();

let CATALOG = { shapes: [], legs: [], finishes: [] };

// Generate planar (top-down XZ projection) UVs for any mesh that lacks them.
// Without UVs THREE can't map a texture onto the mesh at all — the tabletops
// in our GLBs are exported without UVs, so the wood texture would just not
// show. Called once per loaded shape.
function ensurePlanarUVs(root) {
  root.traverse(o => {
    if (!o.isMesh || !o.geometry) return;
    if (o.geometry.attributes.uv) return; // already has UVs
    const pos = o.geometry.attributes.position;
    if (!pos) return;
    o.geometry.computeBoundingBox();
    const b = o.geometry.boundingBox;
    const sx = Math.max(b.max.x - b.min.x, 0.0001);
    const sz = Math.max(b.max.z - b.min.z, 0.0001);
    const uv = new Float32Array(pos.count * 2);
    for (let i = 0; i < pos.count; i++) {
      uv[i*2]     = (pos.getX(i) - b.min.x) / sx;
      uv[i*2 + 1] = (pos.getZ(i) - b.min.z) / sz;
    }
    o.geometry.setAttribute('uv', new THREE.BufferAttribute(uv, 2));
  });
}

const state = { shape: null, leg: null, length: null, finish: null };
let currentRoot = null;
let unitScale = 1;
const shapeCache = {};
const textureCache = {};

const draco = new DRACOLoader();
draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
const loader = new GLTFLoader();
loader.setDRACOLoader(draco);

function showToast(msg, ms) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._tid);
  const dur = ms === undefined ? 1800 : ms;
  if (dur > 0) el._tid = setTimeout(() => el.classList.remove('show'), dur);
}

async function loadCatalog() {
  const r = await fetch('catalog.json');
  CATALOG = await r.json();
  state.shape = CATALOG.shapes[0].key;
  state.leg = CATALOG.legs[0].key;
  state.length = pickDefaultLength(CATALOG.shapes[0]);
  state.finish = CATALOG.finishes[0].key;
}
const pickDefaultLength = s => (s.lengths || [])[Math.floor((s.lengths || []).length / 2)] || (s.lengths||[])[0];

function loadShape(key) {
  if (shapeCache[key]) return Promise.resolve(shapeCache[key]);
  const cfg = CATALOG.shapes.find(s => s.key === key);
  if (!cfg) return Promise.reject(new Error('unknown shape'));
  const loaderEl = document.getElementById('loader');
  const bar = document.getElementById('bar');
  const txt = document.getElementById('loader-text');
  loaderEl.classList.remove('hidden');
  bar.style.width = '0%';
  txt.textContent = 'Lade ' + cfg.name + '…';
  return new Promise((resolve, reject) => {
    loader.load('assets/shapes/' + cfg.file,
      g => { shapeCache[key] = g.scene; loaderEl.classList.add('hidden'); resolve(g.scene); },
      xhr => { if (xhr.total) bar.style.width = (xhr.loaded / xhr.total * 100) + '%'; },
      err => { loaderEl.classList.add('hidden'); reject(err); }
    );
  });
}

async function setActiveShape(key) {
  if (currentRoot) scene.remove(currentRoot);
  let root;
  try { root = (await loadShape(key)).clone(true); }
  catch (e) { console.error(e); showToast('Modell konnte nicht geladen werden', 5000); return; }
  currentRoot = root;
  scene.add(currentRoot);
  normalizeShape(currentRoot);
  ensurePlanarUVs(currentRoot);
  applyState();
}

function normalizeShape(root) {
  root.updateMatrixWorld(true);
  const box = new THREE.Box3().setFromObject(root);
  if (box.isEmpty()) { unitScale = 1; return; }
  const sy = box.max.y - box.min.y;
  if (sy > 500) unitScale = 0.001;
  else if (sy > 5) unitScale = 0.01;
  else unitScale = 1;
}
const BASE_LENGTH = 240;
function applyScale() {
  if (!currentRoot) return;
  const sx = state.length ? state.length / BASE_LENGTH : 1;
  currentRoot.scale.set(unitScale * sx, unitScale, unitScale);
  currentRoot.updateMatrixWorld(true);
}

function applyState() {
  if (!currentRoot) return;
  const legCfg = CATALOG.legs.find(l => l.key === state.leg);
  const wanted = legCfg ? legCfg.nodeMatches.map(m => m.toLowerCase()) : [];

  // Pass 1: tabletops always show. Collect leg candidates whose extracted
  // seg exactly matches one of the wanted patterns. Hide everything else.
  const legCandidates = [];
  currentRoot.traverse(o => {
    if (!o.isMesh) return;
    const rawLower = (o.name || '').toLowerCase();
    if (/table_top|tabletop/.test(rawLower)) { o.visible = true; return; }
    if (!legCfg) { o.visible = true; return; }
    const seg = extractLegSeg(o.name || '');
    if (wanted.includes(seg)) legCandidates.push(o);
    else o.visible = false;
  });

  // Pass 2: dedup wood vs metal variants of the same leg.
  // If a non-WOOD variant exists, hide the _-_WOOD ones.
  const hasNonWood = legCandidates.some(o => !/_-_wood/.test((o.name || '').toLowerCase()));
  legCandidates.forEach(o => {
    const isWood = /_-_wood/.test((o.name || '').toLowerCase());
    o.visible = hasNonWood ? !isWood : true;
  });

  applyScale();
  recenter();
  applyFinish();
  updateOverzicht();
}

// Normalise a mesh name into a leg-segment for catalog matching.
function extractLegSeg(name) {
  let n = (name || '').toLowerCase();
  n = n.replace(/_\d{3,4}\d*(_\d+)?$/, '');
  n = n.replace(/^[a-z]+_+/, '');
  n = n.replace(/^_+/, '');
  n = n.replace(/_-_wood$/, '');
  n = n.replace(/_leg_rec_table_90_100_110$/, '');
  n = n.replace(/_leg_round_table_90$/, '');
  n = n.replace(/_\d$/, '');
  return n;
}


function recenter() {
  if (!currentRoot) return;
  currentRoot.updateMatrixWorld(true);
  const box = new THREE.Box3();
  currentRoot.traverse(o => {
    if (!o.isMesh || !o.visible) return;
    const cb = new THREE.Box3().setFromObject(o);
    if (!cb.isEmpty()) box.union(cb);
  });
  if (box.isEmpty()) return;
  const c = box.getCenter(new THREE.Vector3());
  currentRoot.position.x -= c.x;
  currentRoot.position.z -= c.z;
  currentRoot.position.y -= box.min.y;
}

async function ensureTexture(key) {
  if (textureCache[key]) return textureCache[key];
  const cfg = CATALOG.finishes.find(f => f.key === key);
  if (!cfg) return null;
  return new Promise(resolve => {
    new THREE.TextureLoader().load('assets/textures/' + encodeURIComponent(cfg.file),
      tex => {
        tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
        tex.colorSpace = THREE.SRGBColorSpace;
        tex.anisotropy = 8;
        textureCache[key] = tex;
        resolve(tex);
      }, undefined, () => resolve(null));
  });
}

async function applyFinish() {
  if (!currentRoot) return;
  const tex = await ensureTexture(state.finish);
  if (!tex) return;
  currentRoot.traverse(o => {
    if (!o.isMesh || !o.visible || !o.material) return;
    const rawLower = (o.name || '').toLowerCase();
    const isTop = /table_top|tabletop/.test(rawLower);
    const mats = Array.isArray(o.material) ? o.material : [o.material];
    mats.forEach(m => {
      // Decide whether this material represents WOOD.
      // Tabletops are ALWAYS wood. Legs: use color/map heuristic to skip pure metal.
      const matNameLower = (m.name || '').toLowerCase();
      const looksMetal = /metal|steel|stahl|chrom|iron/.test(matNameLower);
      const woody = isTop || ((!looksMetal) && (m.map || (m.color && m.color.r > 0.3 && m.color.g > 0.2 && m.color.b > 0.15)));
      if (!woody) return;
      // Use a per-material cloned texture so we can set repeat independently.
      // Aim for ~1 wood-grain tile per metre — looks natural on a table.
      // We use the WORLD bbox of the mesh (Box3.setFromObject) — that accounts
      // for every parent transform up the hierarchy. Using local geometry bbox
      // would give us cm-unit numbers (artist worked in cm) which made
      // tex.repeat = 260 — the mipmap then averaged the whole wood texture
      // into a flat colour ("painted plastic" look).
      const t = tex.clone();
      t.needsUpdate = true;
      const wb = new THREE.Box3().setFromObject(o);
      const sxw = Math.max(wb.max.x - wb.min.x, 0.05);
      const szw = Math.max(wb.max.z - wb.min.z, 0.05);
      // Rotate the wood texture by 90° around its centre so the grain runs
      // along the short axis of the table instead of along the length.
      t.center.set(0.5, 0.5);
      t.rotation = Math.PI / 2;
      // After a 90° rotation U and V are swapped — set repeat axes accordingly.
      t.repeat.set(Math.max(0.4, szw), Math.max(0.4, sxw));
      m.map = t;
      m.color = new THREE.Color(0xffffff);
      m.metalness = 0;
      m.roughness = 0.7;
      m.needsUpdate = true;
    });
  });
}

function computePrice() {
  const s = CATALOG.shapes.find(x => x.key === state.shape);
  const l = CATALOG.legs.find(x => x.key === state.leg);
  const f = CATALOG.finishes.find(x => x.key === state.finish);
  if (!s || !state.length) return null;
  const baseLen = 200;
  const lenDelta = state.length - baseLen;
  const base = (s.basePrice || 1200);
  const perCm = (s.pricePerCm || 5);
  const legAdd = (l && l.surcharge) || 0;
  const finishAdd = (f && f.surcharge) || 0;
  return Math.round(base + lenDelta * perCm + legAdd + finishAdd);
}
function formatPrice(n) {
  if (n == null) return '€ –';
  // German thousands separator (dot)
  return '€ ' + n.toLocaleString('de-DE');
}

function updateOverzicht() {
  const s = CATALOG.shapes.find(x => x.key === state.shape);
  const l = CATALOG.legs.find(x => x.key === state.leg);
  const f = CATALOG.finishes.find(x => x.key === state.finish);
  const W = s ? s.width : 100;
  const H = s ? s.height : 76;
  const L = state.length || '–';
  document.getElementById('ov-l1').textContent = (s ? s.name : '–') + ' · Eichenholz · ' + (f ? f.name : '–');
  document.getElementById('ov-l2').textContent = L + ' × ' + W + ' × ' + H + ' cm';
  document.getElementById('sub-shape').textContent = s ? s.name : '–';
  document.getElementById('sub-leg').textContent = l ? l.name : '–';
  document.getElementById('sub-length').textContent = state.length ? state.length + ' cm' : '–';
  document.getElementById('sub-finish').textContent = f ? f.name : '–';
  const priceEl = document.getElementById('price');
  if (priceEl) priceEl.textContent = formatPrice(computePrice());
}

function chip(label, isOn, onClick) {
  const el = document.createElement('button');
  el.className = 'chip' + (isOn ? ' on' : '');
  el.type = 'button';
  el.textContent = label;
  el.addEventListener('click', onClick);
  return el;
}
function buildShapeChips() {
  const g = document.getElementById('shape-chips'); g.innerHTML = '';
  CATALOG.shapes.forEach(s => g.appendChild(chip(s.name, state.shape === s.key, async () => {
    if (state.shape === s.key) return;
    state.shape = s.key;
    if (!s.lengths.includes(state.length)) state.length = pickDefaultLength(s);
    buildLengthChips(); buildShapeChips();
    await setActiveShape(s.key);
  })));
}
function buildLegChips() {
  const g = document.getElementById('leg-chips'); g.innerHTML = '';
  CATALOG.legs.forEach(l => g.appendChild(chip(l.name, state.leg === l.key, () => {
    if (state.leg === l.key) return;
    state.leg = l.key;
    buildLegChips();
    applyState();
  })));
}
function buildLengthChips() {
  const g = document.getElementById('length-chips'); g.innerHTML = '';
  const shape = CATALOG.shapes.find(s => s.key === state.shape);
  if (!shape) return;
  shape.lengths.forEach(L => g.appendChild(chip(L + ' cm', state.length === L, () => {
    if (state.length === L) return;
    state.length = L;
    buildLengthChips();
    applyState();
  })));
}
function buildFinishChips() {
  const g = document.getElementById('finish-chips'); g.innerHTML = '';
  CATALOG.finishes.forEach(f => {
    const el = document.createElement('button');
    el.className = 'chip chip-finish' + (state.finish === f.key ? ' on' : '');
    el.type = 'button';
    const sw = document.createElement('span');
    sw.className = 'swatch';
    sw.style.backgroundImage = `url("assets/textures/${encodeURI(f.file)}")`;
    const lbl = document.createElement('span');
    lbl.textContent = f.name;
    el.appendChild(sw);
    el.appendChild(lbl);
    el.addEventListener('click', () => {
      if (state.finish === f.key) return;
      state.finish = f.key;
      buildFinishChips();
      applyFinish();
      updateOverzicht();
    });
    g.appendChild(el);
  });
}

function smoothZoomStep() {
  const dir = camera.position.clone().sub(controls.target);
  const r = dir.length();
  if (Math.abs(r - zoomTargetRadius) < 0.0008) return;
  const newR = r + (zoomTargetRadius - r) * ZOOM_LERP;
  camera.position.copy(controls.target).add(dir.normalize().multiplyScalar(newR));
}
function tick() { smoothZoomStep(); controls.update(); renderer.render(scene, camera); requestAnimationFrame(tick); }
tick();


// ============ URL state restore (?shape=…&leg=…&length=…&finish=…) ============
function applyUrlState() {
  const p = new URLSearchParams(location.search);
  if (p.has('shape')  && CATALOG.shapes.some(s => s.key === p.get('shape')))   state.shape  = p.get('shape');
  if (p.has('leg')    && CATALOG.legs.some(l => l.key === p.get('leg')))       state.leg    = p.get('leg');
  if (p.has('finish') && CATALOG.finishes.some(f => f.key === p.get('finish'))) state.finish = p.get('finish');
  if (p.has('length')) {
    const n = parseInt(p.get('length'), 10);
    const sh = CATALOG.shapes.find(s => s.key === state.shape);
    if (n && sh && sh.lengths.includes(n)) state.length = n;
  }
}

// ============ Icon buttons ============
document.getElementById('btn-save').addEventListener('click', () => {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `zazawoods-esstisch-${state.shape}-${state.leg}-${state.length}cm.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  showToast('Konfiguration gespeichert');
});

document.getElementById('btn-snd').addEventListener('click', async () => {
  const qs = new URLSearchParams({
    shape: state.shape, leg: state.leg, length: state.length, finish: state.finish
  });
  const url = location.origin + location.pathname + '?' + qs.toString();
  try { await navigator.clipboard.writeText(url); showToast('Link in Zwischenablage kopiert'); }
  catch (e) { prompt('Link kopieren:', url); }
});

let dimsShown = false;
document.getElementById('btn-dims').addEventListener('click', () => {
  dimsShown = !dimsShown;
  if (!currentRoot) return;
  // Compute the visible bbox in cm
  currentRoot.updateMatrixWorld(true);
  const box = new THREE.Box3();
  currentRoot.traverse(o => {
    if (!o.isMesh || !o.visible) return;
    const cb = new THREE.Box3().setFromObject(o);
    if (!cb.isEmpty()) box.union(cb);
  });
  if (box.isEmpty()) return;
  const W = Math.round((box.max.x - box.min.x) * 100);
  const D = Math.round((box.max.z - box.min.z) * 100);
  const H = Math.round((box.max.y - box.min.y) * 100);
  showToast(`${W} × ${D} × ${H} cm`, 3500);
});

document.getElementById('btn-ar').addEventListener('click', () => {
  showToast('AR kommt im nächsten Update', 2500);
});

(async () => {
  try {
    await loadCatalog();
    applyUrlState();
    buildShapeChips(); buildLegChips(); buildLengthChips(); buildFinishChips();
    updateOverzicht();
    await setActiveShape(state.shape);
  } catch (e) {
    console.error('init failed', e);
    showToast('Konfigurator konnte nicht geladen werden', 5000);
  }
})();


const ctaBtn = document.getElementById('cta');
if (ctaBtn) ctaBtn.addEventListener('click', () => {
  const subject = encodeURIComponent('Esstisch-Konfiguration: ' + (CATALOG.shapes.find(x => x.key === state.shape)?.name || ''));
  const body = encodeURIComponent(
    'Form: ' + (CATALOG.shapes.find(x => x.key === state.shape)?.name || '–') + '\n' +
    'Gestell: ' + (CATALOG.legs.find(x => x.key === state.leg)?.name || '–') + '\n' +
    'Länge: ' + (state.length || '–') + ' cm\n' +
    'Holzfinish: ' + (CATALOG.finishes.find(x => x.key === state.finish)?.name || '–') + '\n' +
    'Preis: ' + formatPrice(computePrice()) + '\n\n' +
    'Konfiguration ansehen: ' + location.origin + location.pathname + '?' +
      new URLSearchParams({ shape: state.shape, leg: state.leg, length: state.length, finish: state.finish }).toString()
  );
  location.href = 'mailto:info@zazawoods.de?subject=' + subject + '&body=' + body;
});


// Debug: expose internals so we can inspect from devtools / browser tests
window.__zw = {
  get scene() { return scene; },
  get currentRoot() { return currentRoot; },
  get camera() { return camera; },
  get controls() { return controls; },
  get state() { return state; },
  get textureCache() { return textureCache; },
  get shapeCache() { return shapeCache; }
};

document.querySelectorAll('.acc-head').forEach(h => {
  h.addEventListener('click', () => h.parentElement.classList.toggle('open'));
});
</script>
